name: Source Truth Pulse

on:
  pull_request:
    paths:
      - "foreman/source-truth/**"
      - "foreman/atlas/**"
      - "foreman/speaker/**"
      - "scripts/foreman/*source-truth*.mjs"
      - "scripts/foreman/speaker-truth-mirror.mjs"
      - "package.json"
  workflow_dispatch:

jobs:
  source-truth-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify source truth pulse
        run: npm run truth:ci
